<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aspire — a goal-driven buying agent</title>
<style>
  :root { --bg:#0b0e14; --panel:#141a24; --line:#222c3a; --txt:#e6edf3; --muted:#8b97a7;
          --accent:#a78bfa; --accent2:#38bdf8; --good:#4ade80; --warn:#fbbf24; --bad:#f87171; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.55 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:20px 28px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:14px; }
  header h1 { margin:0; font-size:20px; } header .tag { color:var(--muted); font-size:13px; }
  main { max-width:860px; margin:0 auto; padding:24px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  textarea { width:100%; background:#0d121b; color:var(--txt); border:1px solid var(--line); border-radius:9px; padding:12px; font:inherit; resize:vertical; min-height:58px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:12px; }
  button { background:var(--accent); color:#1a1033; border:0; border-radius:8px; padding:10px 18px; font-weight:650; cursor:pointer; }
  button.ghost { background:#0d121b; color:var(--txt); border:1px solid var(--line); }
  button:disabled { opacity:.5; cursor:default; }
  select, input { background:#0d121b; color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; }
  .muted { color:var(--muted); }
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .chip { font-size:12.5px; color:var(--muted); border:1px dashed var(--line); border-radius:20px; padding:5px 11px; cursor:pointer; }
  .chip:hover { color:var(--txt); border-color:var(--accent); }
  .bubble { padding:11px 14px; border-radius:12px; margin:8px 0; max-width:88%; }
  .user { background:#1b2433; margin-left:auto; }
  .agent { background:#171f2b; border:1px solid var(--line); }
  .agent.refuse { border-color:var(--bad); }
  h3 { margin:0 0 8px; font-size:13px; text-transform:uppercase; letter-spacing:.7px; color:var(--accent); }
  .item { display:flex; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); }
  .item:last-child { border-bottom:0; } .item .why { font-size:13px; color:var(--muted); margin-top:2px; }
  .pill { font-size:11.5px; padding:2px 8px; border-radius:20px; border:1px solid var(--line); color:var(--accent2); }
  .totals { display:flex; gap:16px; margin-top:10px; font-size:14px; flex-wrap:wrap; }
  .good { color:var(--good); } .warn { color:var(--warn); } .bad { color:var(--bad); }
  code { background:#0d121b; padding:1px 6px; border-radius:6px; }
  a { color:var(--accent2); } .note { font-size:13px; color:var(--muted); margin-top:8px; }
</style>
</head>
<body>
<header>
  <h1>✦ Aspire</h1>
  <span class="tag">tell it your goal → it plans within budget → buys the gift cards to fund it · <a href="/landing">about</a> · <a href="/">Conduit ⇄</a></span>
</header>
<main>
  <div class="card">
    <div id="convo"></div>
    <textarea id="msg" placeholder="e.g. I want to get fitter and sleep better with a simple home routine."></textarea>
    <div class="chips" id="examples"></div>
    <div class="row">
      <button id="send">Send →</button>
      <label class="muted"><input type="checkbox" id="samples" checked> use sample finance + health data</label>
      <label class="muted">fund mode
        <select id="mode"><option value="safe">safe (free test)</option><option value="live">live (spends credit)</option></select>
      </label>
      <button class="ghost" id="reset">reset</button>
      <span id="status" class="muted"></span>
    </div>
    <div class="note" id="profile"></div>
  </div>
  <div id="planArea"></div>
</main>
<script>
const EXAMPLES = [
  "I want to get fitter and sleep better with a simple home routine.",
  "Help me build a focused home study setup for evening classes.",
  "I want to start cooking healthy meals at home on a budget.",
];
const ex=document.getElementById('examples');
EXAMPLES.forEach(t=>{const c=document.createElement('span');c.className='chip';c.textContent=t;c.onclick=()=>document.getElementById('msg').value=t;ex.appendChild(c);});

let history=[]; let lastPlan=null;
const convo=document.getElementById('convo'), planArea=document.getElementById('planArea');

function bubble(role, text, cls=''){ const d=document.createElement('div'); d.className=`bubble ${role==='user'?'user':'agent'} ${cls}`;
  d.textContent=text; convo.appendChild(d); convo.scrollTop=convo.scrollHeight; }

function renderPlan(p){
  lastPlan=p; planArea.innerHTML='';
  const c=document.createElement('div'); c.className='card';
  let html=`<h3>Plan toward your goal</h3>`;
  p.items.forEach(i=>{ html+=`<div class="item"><div><b>${i.name}</b> <span class="pill">${i.retailer_name}</span>
    <div class="why">${i.why}</div><div class="why"><a href="${i.search_url}" target="_blank" rel="noopener">view on ${i.retailer_name.replace(' Germany','')} →</a></div></div>
    <div style="text-align:right">€${i.est_price_eur}</div></div>`; });
  const okb=p.within_budget;
  html+=`<div class="totals"><span>planned <b>€${p.items_total}</b></span>
    <span class="${okb?'good':'bad'}">${okb?'within':'over'} €${p.budget_eur} budget ${okb?'✓':'✗'}</span>
    <span class="muted">gift cards €${p.funding_total}${p.surplus_eur>0?` (+€${p.surplus_eur} kept as balance)`:''}</span></div>`;
  html+=`<h3 style="margin-top:16px">Funding (autonomous, one invoice)</h3>`;
  p.funding.forEach(f=>{ html+=`<div class="item"><div><b>${f.retailer_name}</b> gift card</div><div>€${f.denomination_eur}</div></div>`; });
  if(p.notes && p.notes.length) html+=`<div class="note">${p.notes.join(' · ')}</div>`;
  html+=`<div class="row"><button id="fund">Fund with Bitrefill →</button>
    <span class="muted">buys the gift cards above from balance — no human clicks pay</span></div>`;
  c.innerHTML=html; planArea.appendChild(c);
  document.getElementById('fund').onclick=fund;
}

async function send(){
  const text=document.getElementById('msg').value.trim(); if(!text) return;
  history.push({role:'user',content:text}); bubble('user',text);
  document.getElementById('msg').value=''; const st=document.getElementById('status'); st.textContent='thinking…';
  const r=await fetch('/api/plan/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({history, use_samples:document.getElementById('samples').checked})});
  const d=await r.json(); st.textContent='';
  document.getElementById('profile').textContent='signals: '+(d.profile||'');
  let txt=d.message||''; if(d.questions && d.questions.length) txt+='\n• '+d.questions.join('\n• ');
  bubble('agent', txt, d.type==='refuse'?'refuse':''); history.push({role:'assistant',content:txt});
  if(d.type==='plan' && d.plan) renderPlan(d.plan); else planArea.innerHTML='';
}

async function fund(){
  if(!lastPlan) return; const st=document.getElementById('status'); st.textContent='funding…';
  const fb=document.getElementById('fund'); fb.disabled=true;
  const res=await fetch('/api/plan/fund',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({plan:lastPlan, mode:document.getElementById('mode').value})});
  const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
  while(true){ const {value,done}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true}); const parts=buf.split('\n\n'); buf=parts.pop();
    for(const part of parts){ const line=part.replace(/^data: /,'').trim(); if(!line) continue;
      const {stage,data}=JSON.parse(line);
      if(stage==='funded') renderFunded(data);
      else if(stage==='funding'){ const c=document.createElement('div'); c.className='card muted'; c.id='funding-msg'; c.textContent='⏳ '+data.message; planArea.appendChild(c); }
      else if(stage==='error'){ const c=document.createElement('div'); c.className='card bad'; c.textContent='Error: '+data.message; planArea.appendChild(c); }
    } }
  st.textContent='done'; fb.disabled=false;
}

function renderFunded(d){
  const m=document.getElementById('funding-msg'); if(m) m.remove();
  const c=document.createElement('div'); c.className='card';
  let html=`<h3>Funded autonomously · ${d.mode} mode</h3>`;
  d.cards.forEach(card=>{ const ok=card.status==='delivered';
    html+=`<div class="item"><div><b>${card.retailer}</b> €${card.denomination_eur} gift card</div>
      <div style="text-align:right"><span class="${ok?'good':'warn'}">${card.status}</span> <span class="muted">code</span> <code>${card.code}</code></div></div>`;
    card.shopping_list.forEach(s=>{ html+=`<div class="item" style="padding-left:14px"><div class="muted">↳ ${s.name} <a href="${s.url}" target="_blank" rel="noopener">view in store →</a></div><div class="muted">€${s.est_price_eur}</div></div>`; });
  });
  html+=`<div class="totals"><span>invoice <code>${d.invoice_id}</code></span><span class="${d.all_delivered?'good':'warn'}">${d.all_delivered?'all delivered ✓':'partial'}</span></div>`;
  if(d.notes && d.notes.length) html+=`<div class="note">${d.notes.join(' ')}</div>`;
  c.innerHTML=html; planArea.appendChild(c);
}

document.getElementById('send').onclick=send;
document.getElementById('msg').addEventListener('keydown',e=>{ if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)) send(); });
document.getElementById('reset').onclick=()=>{ history=[]; lastPlan=null; convo.innerHTML=''; planArea.innerHTML=''; document.getElementById('profile').textContent=''; };
</script>
</body>
</html>
